app = "crypto-trader-late-brook-7250"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUTF8 = "1"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout  = "5s"
    method   = "GET"
    path     = "/crypto_dashboard.html"

[deploy]
  strategy = "immediate"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
  count  = 1
